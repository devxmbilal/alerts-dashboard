name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 – Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2 – Prepare SSH Key
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      # Step 3 – Test SSH Connection (debug)
      - name: Test SSH Connection
        run: |
          echo "🔍 Testing SSH..."
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/deploy_key \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "echo '✅ SSH Connection Successful'" || exit 1

      # Step 4 – Deploy to EC2
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/deploy_key \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

              set -e
              set -x  # Debug mode

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🚀 Starting Deployment on EC2..."
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📍 Current directory: $(pwd)"
              echo "👤 Current user: $(whoami)"
              echo "📅 Date: $(date)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              # Check if directory exists
              if [ ! -d "/var/www/alerts-dashboard" ]; then
                echo "❌ ERROR: /var/www/alerts-dashboard directory does not exist!"
                echo "📁 Creating directory..."
                sudo mkdir -p /var/www/alerts-dashboard
                sudo chown -R $USER:$USER /var/www/alerts-dashboard
              fi

              cd /var/www/alerts-dashboard || {
                echo "❌ ERROR: Cannot change to /var/www/alerts-dashboard"
                exit 1
              }

              echo "✅ Changed to: $(pwd)"

              # Check if it's a git repository
              if [ ! -d ".git" ]; then
                echo "⚠️ Not a git repository. Initializing..."
                git init
                git remote add origin https://github.com/${{ github.repository }}.git || echo "Remote might already exist"
              fi

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🔄 Pulling latest code..."
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              
              git fetch origin main || echo "⚠️ Fetch failed, continuing..."
              git reset --hard origin/main || {
                echo "❌ Git reset failed!"
                exit 1
              }
              
              git pull origin main || {
                echo "❌ Git pull failed!"
                exit 1
              }

              echo "✅ Code pulled successfully"
              echo "📝 Latest commit: $(git log -1 --oneline)"

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📦 Installing dependencies..."
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              # Check if package.json exists
              if [ ! -f "package.json" ]; then
                echo "❌ ERROR: package.json not found!"
                exit 1
              fi

              npm install || {
                echo "❌ ERROR: npm install failed!"
                exit 1
              }

              echo "✅ Dependencies installed"

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🏗️ Building project..."
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              npm run build || {
                echo "❌ ERROR: Build failed!"
                exit 1
              }

              echo "✅ Build completed successfully"

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🔁 Restarting PM2 processes..."
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              # Check if ecosystem.config.cjs exists
              if [ ! -f "ecosystem.config.cjs" ]; then
                echo "❌ ERROR: ecosystem.config.cjs not found!"
                exit 1
              fi

              # Use ecosystem.config.cjs to restart all processes
              pm2 restart ecosystem.config.cjs || {
                echo "⚠️ PM2 restart failed, trying to start..."
                pm2 start ecosystem.config.cjs || {
                  echo "❌ ERROR: PM2 start failed!"
                  pm2 logs --lines 20 --nostream || true
                  exit 1
                }
              }

              # Save PM2 configuration
              pm2 save || echo "⚠️ PM2 save failed (might need 'pm2 startup')"

              echo "📊 PM2 Status:"
              pm2 status

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🎉 Deployment Completed Successfully!"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          EOF
