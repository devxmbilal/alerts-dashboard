name: Deploy to Staging (EC2)

on:
  push:
    branches:
      - develop
      - staging
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'

jobs:
  deploy-staging:
    name: Build and Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: 📦 Create deployment package
        run: |
          mkdir -p deploy-package
          cp -r app components contexts models services utils workers public scripts package.json package-lock.json ecosystem.config.cjs next.config.mjs postcss.config.mjs jsconfig.json deploy-package/
          cp -r .next deploy-package/ 2>/dev/null || echo "No .next directory found"
          mkdir -p deploy-package/logs deploy-package/tmp

      - name: 📦 Compress deployment package
        run: |
          cd deploy-package
          tar -czf ../deployment.tar.gz .
          cd ..

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: 🚀 Deploy to Staging EC2
        run: |
          scp -o StrictHostKeyChecking=no deployment.tar.gz ${{ secrets.EC2_STAGING_USER }}@${{ secrets.EC2_STAGING_HOST }}:/tmp/
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_STAGING_USER }}@${{ secrets.EC2_STAGING_HOST }} << 'ENDSSH'
            set -e
            APP_DIR="/var/www/alerts-dashboard-staging"
            cd /tmp
            sudo rm -rf $APP_DIR/*
            sudo tar -xzf deployment.tar.gz -C $APP_DIR
            sudo chown -R $USER:$USER $APP_DIR
            cd $APP_DIR
            npm ci --production
            pm2 restart ecosystem.config.cjs || pm2 start ecosystem.config.cjs
            pm2 save
            rm -f /tmp/deployment.tar.gz
            echo "✅ Staging deployment completed!"
          ENDSSH

      - name: 🧹 Cleanup
        if: always()
        run: rm -rf deploy-package deployment.tar.gz

