server {
    server_name cryptoaibot.online www.cryptoaibot.online;

    # ---------- SSE FIX for /api/alerts/stream ----------
    location /api/alerts/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # SSE Required Headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Disable buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
        
        # VERY IMPORTANT (disable websocket upgrade for SSE)
        proxy_set_header Connection '';
        proxy_set_header Upgrade '';
        
        # Preserve SSE content type (don't override)
        proxy_pass_header Content-Type;
        
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- SSE FIX for /api/notifications/stream ----------
    location /api/notifications/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # SSE Required Headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Disable buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
        
        # VERY IMPORTANT (disable websocket upgrade for SSE)
        proxy_set_header Connection '';
        proxy_set_header Upgrade '';
        
        # Preserve SSE content type (don't override)
        proxy_pass_header Content-Type;
        
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- SSE FIX for /api/market/stream ----------
    location /api/market/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # SSE Required Headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Disable buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
        
        # VERY IMPORTANT (disable websocket upgrade for SSE)
        proxy_set_header Connection '';
        proxy_set_header Upgrade '';
        
        # Preserve SSE content type (don't override)
        proxy_pass_header Content-Type;
        
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Normal Next.js routes ----------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # allow websocket only for /_next and other internal ws
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/cryptoaibot.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cryptoaibot.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.cryptoaibot.online) {
        return 301 https://$host$request_uri;
    }

    if ($host = cryptoaibot.online) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name cryptoaibot.online www.cryptoaibot.online;
    return 404;
}
