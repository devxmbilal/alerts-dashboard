server {
    server_name smartaiprobot.com www.smartaiprobot.com;

    # ---------- SSE FIX for /api/alerts/stream ----------
    location /api/alerts/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # SSE Required Headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        
        # VERY IMPORTANT (disable websocket upgrade for SSE)
        proxy_set_header Connection '';
        proxy_set_header Upgrade '';
        
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- SSE FIX for /api/notifications/stream ----------
    location /api/notifications/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # SSE Required Headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        
        # VERY IMPORTANT (disable websocket upgrade for SSE)
        proxy_set_header Connection '';
        proxy_set_header Upgrade '';
        
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- SSE FIX for /api/market/stream ----------
    location /api/market/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # SSE Required Headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        
        # VERY IMPORTANT (disable websocket upgrade for SSE)
        proxy_set_header Connection '';
        proxy_set_header Upgrade '';
        
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Normal Next.js routes ----------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # allow websocket only for /_next and other internal ws
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    ssl_certificate /etc/letsencrypt/live/smartaiprobot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartaiprobot.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

